<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Namma Paal Kanakku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-wrap {
      width: 100%;
      max-width: 460px;
      z-index: 1;
      padding: 16px 0;
    }
    .input-row {
      display: flex;
      align-items: center;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      padding: 10px 0;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .input-row:focus-within {
      border-bottom-color: var(--primary);
      box-shadow: 0 6px 16px -8px rgba(149,211,186,0.25);
    }
    .input-row input {
      background: transparent;
      border: none;
      color: var(--on-surface);
      font-family: 'Inter';
      font-size: 16px;
      outline: none;
      flex: 1;
    }
    .input-row input::placeholder { color: rgba(137,147,141,0.5); }
    .input-row .material-symbols-outlined { color: var(--secondary); font-size: 20px; }
    .input-row:focus-within .material-symbols-outlined { color: var(--primary); }
    .eye-btn {
      background: none; border: none; cursor: pointer;
      color: var(--secondary); padding: 2px;
    }
    .eye-btn:hover { color: var(--primary); }
    .strength-bars {
      display: flex; gap: 4px; margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="animated-bg"></div>

  <div class="auth-wrap">
    <!-- Branding -->
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:28px;">
      <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--tertiary));display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 8px 24px rgba(149,211,186,0.25);">
        <span class="material-symbols-outlined fill" style="font-size:36px;color:var(--on-primary-fixed);">eco</span>
      </div>
      <h1 style="font-family:'Inter';font-size:26px;font-weight:700;letter-spacing:-0.01em;color:var(--primary);margin-bottom:5px;">Namma Paal Kanakku</h1>
      <p style="color:var(--on-surface-variant);font-size:13px;">Precision dairy management platform</p>
    </div>

    <!-- Card -->
    <div class="glass-panel" style="border-radius:24px;padding:var(--card-padding);">
      <div style="margin-bottom:24px;">
        <h2 style="font-family:'Inter';font-size:20px;font-weight:500;color:var(--on-surface);margin-bottom:4px;">Create Account</h2>
        <p style="font-size:14px;color:var(--on-surface-variant);">Join the community of modern dairy producers.</p>
      </div>

      {% if error %}
        <div class="alert-stitch alert-error" style="margin-bottom:20px;">
          <span class="material-symbols-outlined" style="font-size:18px;">error_outline</span>
          {{ error }}
        </div>
      {% endif %}

      <form method="POST" id="registerForm" style="display:flex;flex-direction:column;gap:22px;">
        <!-- Mobile -->
        <div>
          <label class="font-label-caps" style="color:var(--secondary);display:block;margin-bottom:8px;">Mobile Number</label>
          <div class="input-row">
            <span class="material-symbols-outlined">call</span>
            <input type="tel" name="phone" placeholder="Enter your mobile" required autocomplete="tel">
          </div>
        </div>
        <!-- Password -->
        <div>
          <label class="font-label-caps" style="color:var(--secondary);display:block;margin-bottom:8px;">Password</label>
          <div class="input-row">
            <span class="material-symbols-outlined">lock</span>
            <input type="password" name="password" id="regPwd" placeholder="••••••••" required oninput="checkStrength(this.value)">
            <button type="button" class="eye-btn" onclick="togglePwd('regPwd','eyeReg')">
              <span class="material-symbols-outlined" id="eyeReg" style="font-size:20px;">visibility</span>
            </button>
          </div>
          <div class="strength-bars">
            <div class="strength-bar" id="s1"></div>
            <div class="strength-bar" id="s2"></div>
            <div class="strength-bar" id="s3"></div>
            <div class="strength-bar" id="s4"></div>
          </div>
          <p class="font-label-caps" style="font-size:10px;margin-top:4px;color:var(--secondary);" id="strengthText">Strength: Weak</p>
        </div>
        <!-- Confirm Password -->
        <div>
          <label class="font-label-caps" style="color:var(--secondary);display:block;margin-bottom:8px;">Confirm Password</label>
          <div class="input-row">
            <span class="material-symbols-outlined">verified_user</span>
            <input type="password" id="confirmPwd" placeholder="••••••••" required>
            <button type="button" class="eye-btn" onclick="togglePwd('confirmPwd','eyeConfirm')">
              <span class="material-symbols-outlined" id="eyeConfirm" style="font-size:20px;">visibility</span>
            </button>
          </div>
        </div>
        <!-- Submit -->
        <button type="submit" class="btn-primary" style="margin-top:8px;" id="regBtn">
          <span>Register Account</span>
          <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>
        </button>
      </form>

      <div style="margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.06);text-align:center;">
        <p style="font-size:14px;color:var(--on-surface-variant);">
          Already have an account?
          <a href="/login" style="color:var(--primary);font-weight:600;text-decoration:none;">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    function togglePwd(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      input.type  = input.type === 'password' ? 'text' : 'password';
      icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
    }

    function checkStrength(val) {
      const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
      const text = document.getElementById('strengthText');
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const colors = ['#ffb4ab','rgba(69,223,164,0.5)','#45dfa4','#95d3ba'];
      const labels = ['Weak','Fair','Good','Strong'];

      bars.forEach((bar, i) => {
        bar.style.background = i < strength ? colors[strength-1] : 'rgba(255,255,255,0.1)';
      });
      text.textContent = val.length > 0 ? `Strength: ${labels[Math.max(0,strength-1)]}` : 'Strength: Weak';
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      const pwd = document.getElementById('regPwd').value;
      const confirm = document.getElementById('confirmPwd').value;
      if (pwd !== confirm) {
        e.preventDefault();
        alert('Passwords do not match!');
      }
    });
  </script>
</body>
</html>
